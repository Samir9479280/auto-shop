<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoParts.uz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>AutoParts.uz</h1>
            <div class="cart-status">🛒 Корзина: <span id="cart-count">0</span> шт.</div>
        </div>
    </header>

    <main class="container">
        <h2>Каталог запчастей</h2>
        <div class="products-grid">
            <div class="product-card">
                <h3>Свечи зажигания NGK</h3>
                <p class="price">120 000 сум</p>
                <button class="btn-buy" onclick="addToCart(1, 'Свечи зажигания NGK', 120000)">В корзину</button>
            </div>
            <div class="product-card">
                <h3>Колодки Brembo</h3>
                <p class="price">450 000 сум</p>
                <button class="btn-buy" onclick="addToCart(2, 'Колодки Brembo', 450000)">В корзину</button>
            </div>
            <div class="product-card">
                <h3>Фильтр Shell</h3>
                <p class="price">85 000 сум</p>
                <button class="btn-buy" onclick="addToCart(3, 'Фильтр Shell', 85000)">В корзину</button>
            </div>
        </div>

        <section class="order-section">
            <h2>Оформление заказа</h2>
            <div class="order-summary">x
                <strong>Ваш заказ:</strong>
                <ul id="cart-items">
                    <li>Корзина пуста</li>
                </ul>
                <p>Итого: <span id="cart-total">0</span> сум</p>
            </div>
            <form id="order-form">
                <input type="text" id="username" placeholder="Имя" required>
                <input type="tel" id="phone" placeholder="Телефон" required>
                <button type="submit">Отправить заказ</button>
            </form>
            <ul id="cart-items"></ul>
            <p>Итого: <span id="cart-total">0</span> сум</p>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
